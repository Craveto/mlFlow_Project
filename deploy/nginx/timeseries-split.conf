server {
    listen 80;
    server_name 20.205.20.100;

    location /api/ {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location /admin/ {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000/admin/;
    }

    location /static/ {
        root /home/azureuser/timeseries/dashboard;
    }

    location / {
        proxy_pass http://127.0.0.1:3000/;
    }
}
